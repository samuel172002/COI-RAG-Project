<!DOCTYPE html>
<html>
<head>
    <title>UNT AI Assistant</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
        }
        #chat-container {
            width: 500px;
            margin-top: 50px;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        #chat-box {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 10px;
        }
        .user {
            text-align: right;
            color: blue;
            margin: 5px;
        }
        .bot {
            text-align: left;
            color: green;
            margin: 5px;
        }
        input {
            width: 80%;
            padding: 10px;
        }
        button {
            padding: 10px;
        }
    </style>
</head>
<body>

<div id="chat-container">
    <h2>UNT AI Assistant 🤖</h2>

    <div id="chat-box"></div>

    <input id="query" placeholder="Ask something..." />
    <button onclick="sendQuery()">Send</button>
</div>

<script>
async function sendQuery() {
    let query = document.getElementById("query").value;

    if (!query) return;

    let chatBox = document.getElementById("chat-box");

    chatBox.innerHTML += `<div class="user">You: ${query}</div>`;

    document.getElementById("query").value = "";

    let response = await fetch("http://127.0.0.1:5000/ask", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ query: query })
    });

    let data = await response.json();

    chatBox.innerHTML += `<div class="bot">Bot: ${data.answer}</div>`;

    chatBox.scrollTop = chatBox.scrollHeight;
}
</script>

</body>
</html>
